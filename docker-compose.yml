version: '3.8'

services:
  # PostgreSQL База данных
  postgres:
    image: postgres:15-alpine
    container_name: litera_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-litera_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-litera_pass}
      POSTGRES_DB: ${DB_NAME:-litera_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-litera_user} -d ${DB_NAME:-litera_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - litera_network
    restart: unless-stopped

  # MinIO (S3-совместимое хранилище)
  minio:
    image: minio/minio:latest
    container_name: litera_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - litera_network
    restart: unless-stopped

  # Создание бакета в MinIO
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - litera_network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin123};
      mc mb local/${MINIO_BUCKET:-books} --ignore-existing;
      mc policy set download local/${MINIO_BUCKET:-books};
      echo 'MinIO bucket created successfully';
      exit 0;
      "

  # FastAPI приложение
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: litera_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-litera_user}:${DB_PASSWORD:-litera_pass}@postgres:5432/${DB_NAME:-litera_db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-books}
      MINIO_SECURE: "false"
      SECRET_KEY: ${SECRET_KEY:-your-very-long-random-secret-key-min-50-symbols-change-me-2026}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      PRESIGNED_URL_EXPIRE_MINUTES: ${PRESIGNED_URL_EXPIRE_MINUTES:-60}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - litera_network
    restart: unless-stopped

networks:
  litera_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: